name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          AB179B: ${{ secrets.AB179B }}
          B392C1: ${{ secrets.B392C1 }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('AB179B', '')
          env_b = os.environ.get('B392C1', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 692775afbf1e4d4c66a96da1ad5a9fe89e6e4a9c023cf5 -->', env_a)
          if env_b:
              result = result.replace('<!-- db979797e3ad26c1dc08 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
